name: no-session-links

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scrub session links from PR and scan commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scrub PR title/body; scan commit messages
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          import urllib.request

          DETECT = re.compile(
              r"claude\.ai/(chat|share|code)/"
              r"|(?<![A-Za-z0-9_])session_[A-Za-z0-9_-]{8,}"
              r"|(?<![A-Za-z0-9_])gsd_[A-Za-z0-9_-]{8,}"
          )
          REPLACEMENTS = [
              (re.compile(r"_Generated by \[Claude Code\]\((?:https?://)?claude\.ai/code/session_[A-Za-z0-9_-]+\)_"),
               "_Co-Authored by Claude Code_"),
              (re.compile(r"(?:https?://)?claude\.ai/(chat|share|code)/[^\s)]*"),
               "Co-Authored by Claude Code"),
              (re.compile(r"(?<![A-Za-z0-9_])session_[A-Za-z0-9_-]{8,}"),
               "Co-Authored by Claude Code"),
              (re.compile(r"(?<![A-Za-z0-9_])gsd_[A-Za-z0-9_-]{8,}"),
               "Co-Authored by Claude Code"),
          ]

          def clean(s: str) -> str:
              if not s:
                  return s
              out = s
              for pat, repl in REPLACEMENTS:
                  out = pat.sub(repl, out)
              return re.sub(r"\n{3,}", "\n\n", out)

          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          title = os.environ.get("PR_TITLE", "") or ""
          body = os.environ.get("PR_BODY", "") or ""

          new_title = clean(title)
          new_body = clean(body)
          patch = {}
          if new_title != title:
              patch["title"] = new_title
          if new_body != body:
              patch["body"] = new_body

          if patch:
              print(f"::notice::Scrubbed session link(s) from PR {', '.join(patch)}.")
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}",
                  method="PATCH",
                  data=json.dumps(patch).encode(),
                  headers={
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  resp.read()

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]
          shas = subprocess.check_output(
              ["git", "log", "--format=%H", f"{base}..{head}"],
              text=True,
          ).split()

          failed = False
          for sha in shas:
              msg = subprocess.check_output(
                  ["git", "log", "-1", "--format=%B", sha], text=True,
              )
              hits = [ln for ln in msg.splitlines() if DETECT.search(ln)]
              if hits:
                  failed = True
                  joined = "\n".join(hits)
                  print(f"::error::commit {sha} contains forbidden pattern:\n{joined}")

          if failed:
              print(
                  "::error::Amend the offending commit(s) (git commit --amend) "
                  "and force-push the branch. CLAUDE.md 'Commit / PR hygiene' "
                  "forbids claude.ai/chat, claude.ai/share, claude.ai/code, "
                  "session_*, and gsd_* in commit messages."
              )
              sys.exit(1)
          PY
